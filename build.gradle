plugins {
    id 'com.gtnewhorizons.gtnhconvention'
}

// Ensure large source artwork and editor files are not packaged into the mod JAR.
sourceSets {
    main {
        resources {
                // common editable/source formats
                exclude '**/*.psd', '**/*.PSD', '**/*.psb'
                exclude '**/*.blend', '**/*.blend1'
                exclude '**/*.xcf'
                exclude '**/*.tga', '**/*.TGA'
                exclude '**/*.psd.*'
                // exclude unneeded raw audio sources
                exclude '**/*.wav', '**/*.WAV'
                // exclude backup files
                exclude '**/*.bak', '**/*.BAK'
        }
    }
}

jar {
    // also ensure the jar task excludes these file types if resources filtering is bypassed
    exclude '**/*.psd', '**/*.PSD', '**/*.psb'
    exclude '**/*.blend', '**/*.blend1'
    exclude '**/*.xcf'
    exclude '**/*.tga', '**/*.TGA'
    // exclude raw audio sources also
    exclude '**/*.wav', '**/*.WAV'
    // exclude backup files
    exclude '**/*.bak', '**/*.BAK'
}
